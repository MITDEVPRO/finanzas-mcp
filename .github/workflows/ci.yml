name: CI

on:
  push:
    branches: [main]
  pull_request:

# Workflow estático: sin inputs de eventos (issues/PRs) en comandos — sin riesgo de inyección.
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Tests
        run: uv run --with pytest pytest tests/ -q
      - name: Smoke test del servidor (protocolo MCP por stdio)
        run: uv run python tests/smoke_mcp.py
