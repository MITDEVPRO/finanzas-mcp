name: CI

on:
  push:
    branches: [main]
  pull_request:

# Workflow estático: sin inputs de eventos (issues/PRs) en comandos — sin riesgo de inyección.
jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Tests
        run: uv run --with pytest pytest tests/ -q
      - name: Smoke test del servidor (protocolo MCP por stdio)
        run: |
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
          | uv run finanzas-mcp | python3 -c "
          import json,sys
          for line in sys.stdin:
              m=json.loads(line)
              if m.get('id')==2:
                  n=len(m['result']['tools']); print(f'{n} tools expuestas'); sys.exit(0 if n==25 else 1)
          sys.exit(1)"
